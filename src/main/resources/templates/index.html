<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Friend Match Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --accent: #e84d1c;
            --accent2: #f05f34;
            --text: #e6edf3;
            --muted: #8b949e;
            --success: #3fb950;
            --radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            align-items: center;
            gap: 14px;
            height: 64px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        header h1 { font-size: 1.15rem; font-weight: 700; }
        header span { color: var(--accent); }

        /* ── Main layout ── */
        main { max-width: 960px; margin: 48px auto; padding: 0 24px; }

        /* ── Add player form ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 32px;
        }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 18px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        input[type="number"], input[type="text"] {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 10px 14px;
            font-size: 0.9rem;
            font-family: inherit;
            flex: 1;
            min-width: 180px;
            transition: border-color .2s;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        input::placeholder { color: var(--muted); }
        .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 22px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity .2s, transform .1s;
        }
        .btn:hover { opacity: .9; }
        .btn:active { transform: scale(.97); }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

        /* ── Player table ── */
        .players-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .players-header h2 { font-size: 1.1rem; font-weight: 700; }
        .badge {
            background: var(--accent);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 99px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,.02); }
        .tracking-on  { color: var(--success); font-weight: 600; }
        .tracking-off { color: var(--muted); }
        .steam-id { font-family: monospace; font-size: 0.82rem; color: var(--muted); }
        .action-group { display: flex; gap: 8px; }

        .empty-state {
            text-align: center;
            padding: 56px 0;
            color: var(--muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state p { font-size: 0.95rem; }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--success);
            border-radius: var(--radius);
            padding: 14px 20px;
            font-size: 0.88rem;
            transform: translateY(80px);
            opacity: 0;
            transition: all .3s ease;
            z-index: 999;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        #toast.error { border-left-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo-icon">🎮</div>
    <h1>Dota 2 <span>Friend</span> Match Tracker</h1>
</header>

<main>

    <!-- ── Add Player Form ── -->
    <div class="card">
        <h2>➕ Додати гравця</h2>
        <div class="form-row">
            <input type="number" id="steamId" placeholder="Steam Account ID (32-bit)" />
            <input type="text"   id="personaName" placeholder="Нікнейм (необов'язково)" />
            <button class="btn" onclick="addPlayer()">Додати</button>
        </div>
    </div>

    <!-- ── Players Table ── -->
    <div class="card">
        <div class="players-header">
            <h2>Відслідковувані гравці</h2>
            <span class="badge" id="playerCount"
                  th:text="${players.size()}">0</span>
        </div>

        <!-- Empty state -->
        <div class="empty-state" th:if="${players.isEmpty()}">
            <div class="icon">🕹️</div>
            <p>Ще немає гравців. Додай першого друга вгорі!</p>
        </div>

        <!-- Table -->
        <table th:if="${!players.isEmpty()}">
            <thead>
                <tr>
                    <th>Нікнейм</th>
                    <th>Steam Account ID</th>
                    <th>Статус</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${players}">
                    <td th:text="${p.personaName != null ? p.personaName : '—'}">Arteezy</td>
                    <td class="steam-id" th:text="${p.steamAccountId}">86745912</td>
                    <td>
                        <span class="tracking-on"  th:if="${p.trackingEnabled}">● Активний</span>
                        <span class="tracking-off" th:unless="${p.trackingEnabled}">○ Пауза</span>
                    </td>
                    <td>
                        <div class="action-group">
                            <!-- Sync: pure JS call, NOT inside any form so it never triggers a form submission -->
                            <button class="btn btn-sm"
                                    th:onclick="'syncPlayer(' + ${p.id} + ')'"
                                    type="button"
                                    title="Завантажити останні матчі">
                                🔄 Sync
                            </button>

                            <!-- Stats: simple anchor link -->
                            <a class="btn btn-sm btn-ghost"
                               th:href="'/players/' + ${p.id}">
                                📊 Статистика
                            </a>

                            <!--
                                Delete: its own self-contained form.
                                onsubmit guard is ONLY here — it cannot bleed to the buttons above
                                because they are siblings, not inside this form.
                            -->
                            <form th:action="@{/players/{id}/delete(id=${p.id})}" method="post"
                                  style="display:inline"
                                  onsubmit="return confirm('Видалити гравця та всю статистику?')">
                                <button type="submit" class="btn btn-sm"
                                        style="background:transparent;border:1px solid #e84d1c;color:#e84d1c"
                                        title="Видалити гравця">🗑</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<!-- ── Toast Notification ── -->
<div id="toast"></div>

<script>
    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'show' + (isError ? ' error' : '');
        setTimeout(() => t.className = '', 3000);
    }

    async function addPlayer() {
        const steamId = document.getElementById('steamId').value.trim();
        const personaName = document.getElementById('personaName').value.trim();
        if (!steamId) { showToast('Введи Steam Account ID!', true); return; }

        const res = await fetch('/api/players', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                steam_account_id: parseInt(steamId),
                persona_name: personaName || null,
                tracking_enabled: true
            })
        });

        if (res.ok) {
            showToast('✅ Гравця додано! Оновлення сторінки...');
            setTimeout(() => location.reload(), 1200);
        } else {
            const err = await res.json();
            showToast('❌ ' + (err.detail || 'Помилка'), true);
        }
    }

    async function syncPlayer(id) {
        showToast('⏳ Синхронізація з OpenDota...');
        const res = await fetch('/api/players/' + id + '/sync', { method: 'POST' });
        if (res.ok) {
            const data = await res.json();
            showToast('✅ Збережено нових матчів: ' + data.newMatchesSaved);
        } else {
            showToast('❌ Помилка синхронізації', true);
        }
    }
</script>
</body>
</html>
